# Render Blueprint — free tier Web Service for the FastAPI backend.
# https://render.com/docs/blueprint-spec
#
# Set secret env vars in the Render dashboard (not here):
#   GROQ_API_KEY, TAVILY_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_KEY,
#   CORS_ORIGINS, INVOKE_SECRET

services:
  - type: web
    name: coria-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
